<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f5f5f5;
            color:#333;
        }

        header{
            background:#1f2937;
            color:white;
            padding:30px;
            text-align:center;
        }

        header h1{
            margin-bottom:10px;
        }

        .container{
            max-width:1100px;
            margin:40px auto;
            display:flex;
            flex-wrap:wrap;
            gap:30px;
            padding:20px;
        }

        .info{
            flex:1;
            min-width:280px;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 5px 15px rgba(0,0,0,.1);
        }

        .info h2{
            margin-bottom:20px;
            color:#2563eb;
        }

        .info p{
            margin:15px 0;
            line-height:1.6;
        }

        .formulario{
            flex:2;
            min-width:320px;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 5px 15px rgba(0,0,0,.1);
        }

        .formulario h2{
            margin-bottom:20px;
            color:#2563eb;
        }

        label{
            display:block;
            margin-top:15px;
            margin-bottom:8px;
            font-weight:bold;
        }

        input,
        textarea{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:6px;
            font-size:15px;
        }

        textarea{
            resize:vertical;
        }

        button{
            margin-top:20px;
            background:#2563eb;
            color:white;
            border:none;
            padding:15px 25px;
            border-radius:6px;
            cursor:pointer;
            font-size:16px;
            transition:.3s;
        }

        button:hover{
            background:#1d4ed8;
        }

        footer{
            background:#1f2937;
            color:white;
            text-align:center;
            padding:20px;
            margin-top:40px;
        }

        @media(max-width:768px){
            .container{
                flex-direction:column;
            }
        }
    </style>
</head>
<body>

<header>
    <h1>Entre em Contato</h1>
    <p>Estamos prontos para atender você.</p>
</header>

<div class="container">

    <div class="info">
        <h2>Informações</h2>

        <p>
            <strong>📍 Endereço:</strong><br>
            Rua Exemplo, 123<br>
            Centro - Sua Cidade
        </p>

        <p>
            <strong>📞 Telefone:</strong><br>
            (47) 99999-9999
        </p>

        <p>
            <strong>✉ E-mail:</strong><br>
            contato@empresa.com.br
        </p>

        <p>
            <strong>🕒 Horário:</strong><br>
            Segunda à Sexta<br>
            08:00 às 18:00
        </p>
    </div>

    <div class="formulario">
        <h2>Envie uma Mensagem</h2>

        <form>

            <label for="nome">Nome</label>
            <input
                type="text"
                id="nome"
                name="nome"
                placeholder="Seu nome"
                required>

            <label for="email">E-mail</label>
            <input
                type="email"
                id="email"
                name="email"
                placeholder="seu@email.com"
                required>

            <label for="telefone">Telefone</label>
            <input
                type="tel"
                id="telefone"
                name="telefone"
                placeholder="(00) 00000-0000">

            <label for="assunto">Assunto</label>
            <input
                type="text"
                id="assunto"
                name="assunto"
                placeholder="Assunto da mensagem">

            <label for="mensagem">Mensagem</label>
            <textarea
                id="mensagem"
                name="mensagem"
                rows="6"
                placeholder="Digite sua mensagem..."
                required></textarea>

            <button type="submit">
                Enviar Mensagem
            </button>

        </form>
    </div>

</div>

<footer>
    © 2026 Empresa Exemplo - Todos os direitos reservados.
</footer>

</body>
</html>
